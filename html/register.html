<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Donor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav></nav>

    <main>
        <div class="container">
            <div class="form-container">
                <h2>Donor Registration</h2>
                <div id="registerAlert" class="alert hidden"></div>

                <form id="donorForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="name">Full Name</label>
                            <input type="text" id="name" maxlength="50" required>
                        </div>
                        <div class="form-group">
                            <label for="age">Age</label>
                            <input type="number" id="age" min="18" max="65" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="bloodGroup">Blood Group</label>
                            <select id="bloodGroup" required>
                                <option value="">Select</option>
                                <option>O+</option>
                                <option>O-</option>
                                <option>A+</option>
                                <option>A-</option>
                                <option>B+</option>
                                <option>B-</option>
                                <option>AB+</option>
                                <option>AB-</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone Number</label>
                            <input type="tel" id="phone" inputmode="numeric" maxlength="10" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="city">City</label>
                            <input type="text" id="city" required>
                        </div>
                        <div class="form-group">
                            <label for="area">Area / Locality</label>
                            <input type="text" id="area" required>
                        </div>
                    </div>

                    <input type="hidden" id="lat">
                    <input type="hidden" id="lng">

                    <div class="btn-group">
                        <button type="button" class="btn btn-secondary" id="detectLocationBtn">Detect Location</button>
                        <button type="submit" class="btn btn-primary">Register Donor</button>
                    </div>
                </form>

                <div id="locationLoading" class="hidden text-center mt-2">
                    <div class="spinner"></div>
                    <p>Detecting your location...</p>
                </div>

                <div id="coordinatesInfo" class="info-box hidden">
                    <strong>Detected Coordinates:</strong>
                    <p id="coordinatesText"></p>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Blood Donation Portal</p>
        </div>
    </footer>

    <script src="../js/auth.js"></script>
    <script src="../js/navbar.js"></script>
    <script src="../js/register.js"></script>
</body>
</html>
