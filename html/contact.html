<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Blood Donation Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav></nav>

    <main class="container">
        <h2>Contact Us</h2>

        <div class="form-container">
            <div id="contactAlert" class="alert hidden"></div>
            <form id="contactForm">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" maxlength="50" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" maxlength="80" required>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" rows="5" maxlength="500" required></textarea>
                </div>

                <button type="submit" class="btn btn-primary">Send Message</button>
            </form>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Blood Donation Portal</p>
        </div>
    </footer>

    <script src="../js/auth.js"></script>
    <script src="../js/navbar.js"></script>
    <script src="../js/contact.js"></script>
</body>
</html>
